name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python tests/test_checkers.py
      - name: Check sample files
        run: |
          python cli.py sample/ai_generated.md --no-strip-frontmatter --format json > /dev/null
          python cli.py sample/human_written.md --no-strip-frontmatter --format json > /dev/null
